<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>השירים ליורופוסטמה - עולם המוזיקה</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Rubik', sans-serif;
            margin: 0;
            padding: 0;
            /* שינוי הרקע לשמים תכלת יפים */
            background: linear-gradient(180deg, #7ec0ee 0%, #a1dbff 50%, #e0f4ff 100%);
            color: #1a0033;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .cloud-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/clouds.png') repeat;
            /* העננים נראים הרבה הרבה יותר חזק (העלאת האופסיטי מ-0.18 ל-0.85) */
            opacity: 0.85;
            z-index: 1;
            pointer-events: none;
            animation: moveClouds 40s linear infinite;
            filter: brightness(1.2);
        }

        @keyframes moveClouds {
            from { background-position: 0 0; }
            to { background-position: 1000px 500px; }
        }

        /* הגדרות כלי הנגינה והאנימציות שלהם */
        .instrument-wrapper {
            position: absolute;
            cursor: pointer;
            z-index: 10;
            user-select: none;
            transition: transform 0.2s;
        }

        .instrument-emoji {
            font-size: 4rem;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.9));
            position: relative;
            z-index: 12;
        }

        /* איברים מוסתרים כברירת מחדל */
        .character-part {
            position: absolute;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 11;
        }

        .face { top: 15px; left: 50%; transform: translateX(-50%); font-size: 1.1rem; }
        .left-arm { top: 25px; left: -15px; }
        .right-arm { top: 25px; right: -15px; }
        .left-leg { bottom: -15px; left: 10px; }
        .right-leg { bottom: -15px; right: 10px; }

        /* מצב ריקוד אקטיבי */
        .dancing .character-part {
            opacity: 1;
        }

        .dancing {
            animation: intenseDance 0.5s ease-in-out infinite alternate !important;
        }

        @keyframes intenseDance {
            0% { transform: translateY(0px) scale(1.1) rotate(-15deg); }
            100% { transform: translateY(-20px) scale(1.1) rotate(15deg); }
        }

        /* מיקומים התחלתיים כלליים באוויר */
        .ins-1 { top: 12%; left: 8%; }
        .ins-2 { top: 22%; right: 10%; }
        .ins-3 { top: 50%; left: 12%; }
        .ins-4 { top: 75%; right: 14%; }
        .ins-5 { top: 38%; left: 45%; }

        .pride-bar {
            height: 10px;
            width: 100%;
            background: linear-gradient(to right, #ff0000, #ff8000, #ffff00, #008000, #0000ff, #a000c0);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        header {
            padding: 130px 20px 40px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            margin-bottom: 30px;
            border-bottom: 3px solid rgba(255,255,255,0.5);
            position: relative;
            z-index: 5;
        }

        header h1 {
            font-size: 3.3rem;
            margin: 0;
            font-weight: 900;
            color: #150050;
            text-shadow: 0 0 25px rgba(255, 255, 255, 1), 2px 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 5;
        }

        .article-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 45px 35px;
            margin-bottom: 40px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 55px rgba(0,0,0,0.15), inset 0 0 25px rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        /* עיצוב הטקסטים החדשים לבקשתך */
        .no-songs-title {
            color: red;
            font-size: 5rem;
            font-weight: 900;
            margin: 10px 0;
            text-shadow: 3px 3px 0px #fff, -3px -3px 0px #fff, 3px -3px 0px #fff, -3px 3px 0px #fff;
            animation: pulseText 1.5s infinite alternate;
        }

        .love-idans {
            color: #ffcc00;
            font-size: 3.2rem;
            font-weight: 700;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3), 1px 1px 0px #000;
        }

        @keyframes pulseText {
            0% { transform: scale(1); }
            100% { transform: scale(1.04); }
        }

        .back-nav-container {
            text-align: center;
            margin-top: 25px;
        }

        .btn-back-home {
            display: inline-block;
            padding: 12px 40px;
            background: #150050;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-back-home:hover {
            background: white;
            color: #1a0033;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="pride-bar"></div>
    <div class="cloud-bg"></div>

    <div class="instrument-wrapper ins-1" onclick="playAndDance(this, 'guitar')">
        <div class="character-part face">😊</div>
        <div class="character-part left-arm">💪</div>
        <div class="character-part right-arm">👋</div>
        <div class="character-part left-leg">👟</div>
        <div class="character-part right-leg">👟</div>
        <div class="instrument-emoji">🎸</div>
    </div>

    <div class="instrument-wrapper ins-2" onclick="playAndDance(this, 'trumpet')">
        <div class="character-part face">😀</div>
        <div class="character-part left-arm">🙌</div>
        <div class="character-part right-arm">👍</div>
        <div class="character-part left-leg">🥾</div>
        <div class="character-part right-leg">🥾</div>
        <div class="instrument-emoji">🎺</div>
    </div>

    <div class="instrument-wrapper ins-3" onclick="playAndDance(this, 'synth')">
        <div class="character-part face">😎</div>
        <div class="character-part left-arm">✌️</div>
        <div class="character-part right-arm">🎈</div>
        <div class="character-part left-leg">👟</div>
        <div class="character-part right-leg">👟</div>
        <div class="instrument-emoji">🎶</div>
    </div>

    <div class="instrument-wrapper ins-4" onclick="playAndDance(this, 'piano')">
        <div class="character-part face">😆</div>
        <div class="character-part left-arm">🤝</div>
        <div class="character-part right-arm">✨</div>
        <div class="character-part left-leg">👠</div>
        <div class="character-part right-leg">👠</div>
        <div class="instrument-emoji">🎹</div>
    </div>

    <div class="instrument-wrapper ins-5" onclick="playAndDance(this, 'violin')">
        <div class="character-part face">😍</div>
        <div class="character-part left-arm">🎵</div>
        <div class="character-part right-arm">🎻</div>
        <div class="character-part left-leg">👞</div>
        <div class="character-part right-leg">👞</div>
        <div class="instrument-emoji">🎻</div>
    </div>

    <header>
        <h1>☁️ עולם המוזיקה של התחרות ☁️</h1>
    </header>

    <div class="container">

        <div class="article-card">
            <div class="no-songs-title">עוד אין שירים</div>
            <div class="love-idans">אוהבים עידנים</div>
        </div>

        <div class="back-nav-container">
            <a href="index.html" class="btn-back-home">🏠 חזרה לעמוד הראשי</a>
        </div>

    </div>

    <script>
        // מערכת יצירת סאונד ייחודי לכל כלי נגינה באמצעות Web Audio API
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
        }

        function playAndDance(element, instrumentType) {
            initAudio();
            
            // הפעלת האנימציה והצגת האיברים
            if (element.classList.contains('dancing')) return;
            element.classList.add('dancing');

            // יצירת והשמעת הצליל המתאים לכלי
            try {
                if (instrumentType === 'guitar') {
                    // צליל גיטרה אקוסטית/חשמלית (גל משולש חם עם דעיכה מהירה)
                    playTone(196.00, 'triangle', 0.4, 0.1);
                    setTimeout(() => playTone(293.66, 'triangle', 0.4, 0.15), 100);
                    setTimeout(() => playTone(392.00, 'triangle', 0.5, 0.3), 200);
                } 
                else if (instrumentType === 'trumpet') {
                    // צליל חצוצרה (גל שן-מסור חותך וגבוה)
                    playTone(349.23, 'sawtooth', 0.3, 0.4);
                    setTimeout(() => playTone(523.25, 'sawtooth', 0.3, 0.5), 150);
                } 
                else if (instrumentType === 'synth') {
                    // צליל אפקטים/סינתיסייזר (שילוב גלי סינוס קופצניים)
                    playTone(440, 'sine', 0.4, 0.2);
                    setTimeout(() => playTone(880, 'sine', 0.4, 0.2), 120);
                } 
                else if (instrumentType === 'piano') {
                    // צליל פסנתר (מכת גל סינוס עמוקה בשילוב הרמוניה)
                    playTone(261.63, 'sine', 0.6, 0.6);
                    playTone(329.63, 'sine', 0.4, 0.5);
                    playTone(392.00, 'sine', 0.4, 0.5);
                } 
                else if (instrumentType === 'violin') {
                    // צליל כינור (גל שן-מסור ארוך עם עלייה הדרגתית)
                    playTone(293.66, 'sawtooth', 0.2, 0.7, true);
                    setTimeout(() => playTone(440.00, 'sawtooth', 0.2, 0.8, true), 200);
                }
            } catch(e) { console.log("Audio error:", e); }

            // הפסקת הריקוד לאחר שנייה וחצי
            setTimeout(() => {
                element.classList.remove('dancing');
            }, 1500);
        }

        function playTone(freq, type, volume, duration, isViolin = false) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            // בניית מעטפת עוצמה (Envelop) כדי לחקות את הכלי במדויק
            if (isViolin) {
                // לכינור יש מעבר רך בהתחלה
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.15);
            } else {
                // לפסנתר וגיטרה יש מכה חזקה מיד על ההתחלה
                gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            }
            
            // דעיכת הצליל בסוף
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
    </script>

</body>
</html>
