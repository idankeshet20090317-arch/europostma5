<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>יורופוסטמה - PUSTEMA NEWS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #020410;
            font-family: 'Rubik', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* חצי עליון: שילוב התמונה עם אפקט מסיסה (Fade) ומעבר חלק לחלל */
        .image-container {
            width: 100vw;
            height: 50vh; 
            overflow: hidden;
            position: relative;
            background: #020410;
        }

        .full-screen-image {
            width: 100%;
            height: 100%; 
            object-fit: cover; 
            display: block;
            pointer-events: none;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%);
        }

        /* חצי תחתון: אזור החלל המורחב */
        .space-section {
            width: 100vw;
            min-height: 140vh; /* מוגדל כדי לתת מקום לכוכבי הענק */
            position: relative;
            background: radial-gradient(circle at center, #060a1f 0%, #01020a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            box-sizing: border-box;
        }

        /* קנבס החלל */
        #spaceCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* תוכן מעל הקנבס */
        .space-content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
            width: 100%;
            max-width: 800px;
        }

        /* כותרת PUSTEMA NEWS הזוהרת */
        .news-title {
            font-size: 4.5rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff, 0 0 50px #ff00ff, 0 0 90px #ff00ff;
            animation: titlePulse 3s ease-in-out infinite alternate;
        }

        @keyframes titlePulse {
            0% { transform: scale(1); filter: hue-rotate(0deg); }
            100% { transform: scale(1.04); filter: hue-rotate(30deg); }
        }

        /* כפתור חזרה משודרג */
        .back-btn {
            background: linear-gradient(135deg, #7f00ff, #ff007f);
            color: white;
            border: 3px solid white;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.7);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }

        .back-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.9);
            background: linear-gradient(135deg, #00ffff, #7f00ff);
        }

        /* מסך אלמנט החייזר הקופץ (Jumpscare) */
        #jumpscareOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .alien-scare {
            font-size: 28rem;
            animation: shakeAndGrow 0.35s infinite alternate;
        }

        @keyframes shakeAndGrow {
            0% { transform: scale(0.85) translate(8px, 8px) rotate(-6deg); }
            100% { transform: scale(1.25) translate(-8px, -8px) rotate(6deg); }
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="54948c6c-01ab-4459-9d88-e804a82093db.jfif" class="full-screen-image" alt="News Image">
    </div>

    <div class="space-section">
        <canvas id="spaceCanvas"></canvas>

        <div class="space-content">
            <h1 class="news-title">PUSTEMA NEWS</h1>
            <button class="back-btn" onclick="triggerAlienScare()">🛸 חזרה לעמוד הראשי</button>
        </div>
    </div>

    <div id="jumpscareOverlay">
        <div class="alien-scare">👽</div>
    </div>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const section = document.querySelector('.space-section');
            canvas.width = section.clientWidth;
            canvas.height = section.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const stars = [];
        const planets = [];
        const particles = [];
        const shockwaves = [];

        // יצירת רקע כוכבים מנצנצים
        for (let i = 0; i < 90; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                size: Math.random() * 3.5 + 1.5,
                color: Math.random() > 0.4 ? '#ffffff' : '#fef08a',
                alpha: Math.random(),
                speed: Math.random() * 0.02 + 0.008
            });
        }

        // הגדרת מאפיינים לכוכבי לכת אמיתיים - הגודל (radius) הוגדל פי 5!
        const planetTemplates = [
            { name: 'מאדים', type: 'mars', color: '#e74c3c', secondaryColor: '#c0392b', radius: 110 }, // היה 22, עכשיו 110!
            { name: 'שבתאי', type: 'saturn', color: '#f39c12', secondaryColor: '#f1c40f', radius: 130, hasRing: true }, // היה 26, עכשיו 130!
            { name: 'צדק', type: 'jupiter', color: '#d35400', secondaryColor: '#e67e22', radius: 170, hasStripes: true }, // היה 34, עכשיו 170!
            { name: 'נפטון', type: 'neptune', color: '#2980b9', secondaryColor: '#3498db', radius: 125 } // היה 25, עכשיו 125!
        ];

        // בניית כוכבי הלכת במסך עם מרווחים מותאמים לגודל החדש
        planetTemplates.forEach((template, index) => {
            planets.push({
                ...template,
                x: 0.15 + (index * 0.24), // חלוקה אופקית יפה שלא יתנגשו
                y: 0.35 + Math.random() * 0.3,
                isDead: false,
                respawnTimer: 0
            });
        });

        // פונקציית פיצוץ ריאליסטי - מותאם לכוכבי הענק
        function explodePlanet(planet) {
            planet.isDead = true;
            planet.respawnTimer = 240; // חוזר אחרי כ-4 שניות

            const actualX = planet.x * canvas.width;
            const actualY = planet.y * canvas.height;

            // גל הדף לוהט ענק בהתאם לגודל החדש
            shockwaves.push({
                x: actualX,
                y: actualY,
                radius: planet.radius,
                maxRadius: planet.radius * 2.5,
                alpha: 1,
                color: '#ff4500'
            });

            // יצירת חלקיקי פיצוץ רבים וגדולים יותר
            for (let i = 0; i < 120; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 9 + 2;
                const colorPool = [planet.color, '#ff3300', '#ffcc00', '#ff7700', '#333333'];
                const particleColor = colorPool[Math.floor(Math.random() * colorPool.length)];

                particles.push({
                    x: actualX,
                    y: actualY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 7 + 2, // חלקיקים גדולים יותר לפיצוץ מסיבי
                    color: particleColor,
                    alpha: 1,
                    decay: Math.random() * 0.012 + 0.006
                });
            }
        }

        // פונקציה לציור גרפיקה ריאליסטית של כוכב לכת ענק
        function drawRealisticPlanet(ctx, p, x, y) {
            ctx.save();
            
            // צל וזוהר חיצוני אטמוספרי מוגבר לענק
            ctx.shadowBlur = 45;
            ctx.shadowColor = p.color;

            // בסיס כדור הלכת (מפלס צבעים תלת-ממדי)
            const gradient = ctx.createRadialGradient(x - p.radius/3, y - p.radius/3, p.radius/6, x, y, p.radius);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.2, p.color);
            gradient.addColorStop(0.8, p.secondaryColor);
            gradient.addColorStop(1, '#000000'); // הוספת צד אפל ריאליסטי
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, p.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // פסים אופקיים מפורטים לצדק (Jupiter)
            if (p.hasStripes) {
                ctx.globalAlpha = 0.2;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x - p.radius, y - p.radius/3, p.radius * 2, 12);
                ctx.fillRect(x - p.radius, y + p.radius/4, p.radius * 2, 15);
                ctx.fillStyle = '#4a2306';
                ctx.fillRect(x - p.radius, y - p.radius/1.6, p.radius * 2, 8);
                ctx.fillRect(x - p.radius, y + p.radius/1.8, p.radius * 2, 10);
            }

            // טבעת ענקית לשבתאי (Saturn)
            if (p.hasRing) {
                ctx.globalAlpha = 0.65;
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 14; // עבה יותר
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(-0.2); // זווית נטייה קלה לטבעת למראה ריאליסטי
                ctx.scale(2.2, 0.35);
                ctx.beginPath();
                ctx.arc(0, 0, p.radius + 15, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            ctx.restore();
        }

        // לולאת האנימציה הראשית
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. כוכבים מנצנצים ברקע
            stars.forEach(star => {
                star.alpha += star.speed;
                if (star.alpha > 1 || star.alpha < 0) star.speed = -star.speed;
                ctx.save();
                ctx.globalAlpha = Math.max(0.1, star.alpha);
                ctx.fillStyle = star.color;
                ctx.beginPath();
                ctx.arc(star.x * canvas.width, star.y * canvas.height, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // 2. עדכון וציור גלי ההדף (Shockwaves)
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                const wave = shockwaves[i];
                wave.radius += 4.5; // פיצוץ מהיר ועוצמתי יותר
                wave.alpha -= 0.012;

                if (wave.alpha <= 0) {
                    shockwaves.splice(i, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = wave.alpha;
                    ctx.strokeStyle = wave.color;
                    ctx.lineWidth = 8;
                    ctx.shadowBlur = 35;
                    ctx.shadowColor = wave.color;
                    ctx.beginPath();
                    ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // 3. כוכבי הלכת הריאליסטיים הענקיים
            planets.forEach(planet => {
                if (!planet.isDead) {
                    if (Math.random() < 0.0015) { // הסתברות מותאמת
                        explodePlanet(planet);
                        return;
                    }
                    const actualX = planet.x * canvas.width;
                    const actualY = planet.y * canvas.height;
                    drawRealisticPlanet(ctx, planet, actualX, actualY);
                } else {
                    planet.respawnTimer--;
                    if (planet.respawnTimer <= 0) {
                        planet.isDead = false;
                    }
                }
            });

            // 4. חלקיקי הפיצוץ המסיביים
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = p.color;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            requestAnimationFrame(animate);
        }

        animate();

        // ג'אמפסקר מעבר חזרה לעמוד הראשי
        function triggerAlienScare() {
            const overlay = document.getElementById('jumpscareOverlay');
            overlay.style.display = 'flex';

            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(850, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.75);
            } catch(e) {}

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }
    </script>
</body>
</html>
