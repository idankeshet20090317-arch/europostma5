<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יורופוסטמה - האתר הרשמי</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rubik', sans-serif;
            margin: 0;
            padding: 0;
            /* רקע קשת בענן משודרג - המון צבעים בבת אחת על המסך! */
            background: linear-gradient(
                45deg, 
                #ff0000, #ff7700, #ffdd00, #00ff00, 
                #00ffff, #0055ff, #9900ff, #ff00ff,
                #ff0055, #00ffaa, #ffbb00, #ff0000
            );
            background-size: 400% 400%;
            animation: ultimateRainbow 10s linear infinite;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes ultimateRainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .pride-bar {
            height: 10px;
            width: 100%;
            background: linear-gradient(to right, #ff0000, #ff8000, #ffff00, #008000, #0000ff, #a000c0);
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        header {
            padding: 50px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            margin-bottom: 30px;
            border-bottom: 3px solid rgba(255,255,255,0.2);
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 900;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.6);
            letter-spacing: 1px;
        }

        header p {
            font-size: 1.4rem;
            margin: 10px 0 0;
            opacity: 0.95;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* עיצוב קופסת הטיימר הממוקמת מתחת לתת הכותרת */
        .countdown-container {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #ffff00;
            border-radius: 15px;
            padding: 15px;
            max-width: 500px;
            margin: 25px auto 0 auto;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        .countdown-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: bold;
            color: #ffff00;
        }

        .countdown-display {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .card::before {
            content: "🇪🇺 🏳️‍🌈";
            position: absolute;
            top: 15px;
            left: 20px;
            opacity: 0.25;
            font-size: 1.5rem;
        }

        h2 {
            font-size: 1.8rem;
            margin-top: 0;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
            color: #ffff00;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }

        p, li {
            font-size: 1.15rem;
            line-height: 1.7;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
