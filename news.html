<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>יורופוסטמה - PUSTEMA NEWS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #020617;
            font-family: 'Rubik', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* חצי עליון: תמונה שתופסת בדיוק 50% מגובה המסך */
        .image-container {
            width: 100vw;
            height: 50vh; 
            overflow: hidden;
            position: relative;
        }

        .full-screen-image {
            width: 100%;
            height: 100%; 
            object-fit: cover; 
            display: block;
            pointer-events: none; /* מונע לחיצות או גרירה של התמונה */
        }

        /* חצי תחתון: אזור החלל העמוק */
        .space-section {
            width: 100vw;
            min-height: 120vh; /* מוגדל בכוונה כדי שתוכל לגלול למטה ולראות את החלל */
            position: relative;
            background: radial-gradient(circle at center, #090d22 0%, #020410 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            box-sizing: border-box;
        }

        /* קנבס הרקע של הכוכבים והפיצוצים */
        #spaceCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* תוכן מעל הקנבס */
        .space-content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 800px;
        }

        /* כותרת PUSTEMA NEWS זוהרת ואפלה */
        .news-title {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #ff00ff, 0 0 80px #ff00ff;
            animation: titlePulse 3s ease-in-out infinite alternate;
        }

        @keyframes titlePulse {
            0% { transform: scale(1); filter: hue-rotate(0deg); }
            100% { transform: scale(1.03); filter: hue-rotate(45deg); }
        }

        /* כפתור החזרה לעמוד הראשי */
        .back-btn {
            background: linear-gradient(135deg, #7f00ff, #ff007f);
            color: white;
            border: 3px solid white;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }

        .back-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(0, 255, 255, 0.9);
            background: linear-gradient(135deg, #00ffff, #7f00ff);
        }

        /* מסך אלמנט החייזר הקופץ (Jumpscare) */
        #jumpscareOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
        }

        /* עיצוב החייזר הגדול */
        .alien-scare {
            font-size: 25rem; /* גודל ענק */
            animation: shakeAndGrow 0.4s infinite alternate;
        }

        @keyframes shakeAndGrow {
            0% { transform: scale(0.8) translate(5px, 5px) rotate(-5deg); }
            100% { transform: scale(1.2) translate(-5px, -5px) rotate(5deg); }
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="54948c6c-01ab-4459-9d88-e804a82093db.jfif" class="full-screen-image" alt="News Image">
    </div>

    <div class="space-section">
        <canvas id="spaceCanvas"></canvas>

        <div class="space-content">
            <h1 class="news-title">PUSTEMEMA NEWS</h1>
            
            <button class="back-btn" onclick="triggerAlienScare()">🛸 חזרה לעמוד הראשי</button>
        </div>
    </div>

    <div id="jumpscareOverlay">
        <div class="alien-scare">👽</div>
    </div>

    <script>
        // הגדרות הקנבס והחלל
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const section = document.querySelector('.space-section');
            canvas.width = section.clientWidth;
            canvas.height = section.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // מערכים לכוכבים, כוכבי לכת וחלקיקי פיצוץ
        const stars = [];
        const planets = [];
        const particles = [];

        // צבעים זוהרים לכוכבי הלכת
        const neonColors = ['#ff0055', '#00ffff', '#ffff00', '#ff00ff', '#00ffaa', '#ff7700'];

        // יצירת כוכבים רגילים (צהובים ולבנים, גדולים ומנצנצים)
        for (let i = 0; i < 80; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                size: Math.random() * 4 + 2, // כוכבים די גדולים
                color: Math.random() > 0.5 ? '#ffff00' : '#ffffff', // חצי צהוב חצי לבן
                alpha: Math.random(),
                speed: Math.random() * 0.02 + 0.01
            });
        }

        // יצירת 4 כוכבי לכת דינמיים שמועדים לפיצוץ
        const planetNames = ['מרקוריוס', 'ונוס', 'פוסטמה-X', 'נפטון'];
        for (let i = 0; i < 4; i++) {
            planets.push({
                x: Math.random() * 0.8 + 0.1,
                y: Math.random() * 0.7 + 0.1,
                radius: Math.random() * 20 + 20, // גודל כוכב לכת
                color: neonColors[i % neonColors.length],
                isDead: false,
                respawnTimer: 0
            });
        }

        // פונקציית יצירת פיצוץ ל-100 חלקיקים
        function explodePlanet(planet) {
            planet.isDead = true;
            planet.respawnTimer = 200; // הזמן עד שהוא חוזר (בערך 3-4 שניות)

            const actualX = planet.x * canvas.width;
            const actualY = planet.y * canvas.height;

            for (let i = 0; i < 100; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                particles.push({
                    x: actualX,
                    y: actualY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 4 + 1,
                    color: planet.color,
                    alpha: 1,
                    decay: Math.random() * 0.015 + 0.01
                });
            }
        }

        // לולאת האנימציה המרכזית (Render Loop)
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. ציור ואנימציה של כוכבים מנצנצים ונעלמים
            stars.forEach(star => {
                star.alpha += star.speed;
                if (star.alpha > 1 || star.alpha < 0) {
                    star.speed = -star.speed; // הופך כיוון ניצנוץ
                }
                ctx.save();
                ctx.globalAlpha = Math.max(0.1, star.alpha);
                ctx.shadowBlur = 10;
                ctx.shadowColor = star.color;
                ctx.fillStyle = star.color;
                ctx.beginPath();
                ctx.arc(star.x * canvas.width, star.y * canvas.height, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // 2. ציור כוכבי הלכת הבוהקים
            planets.forEach(planet => {
                if (!planet.isDead) {
                    // סיכוי אקראי קטן מאוד להתפוצץ בכל פריים
                    if (Math.random() < 0.003) {
                        explodePlanet(planet);
                        return;
                    }

                    const actualX = planet.x * canvas.width;
                    const actualY = planet.y * canvas.height;

                    ctx.save();
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = planet.color;
                    ctx.fillStyle = planet.color;
                    ctx.beginPath();
                    ctx.arc(actualX, actualY, planet.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // הוספת טבעת או אפקט זוהר פנימי
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 0.4;
                    ctx.beginPath();
                    ctx.arc(actualX, actualY, planet.radius + 8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                } else {
                    // ספירה לאחור לחזרת כוכב הלכת
                    planet.respawnTimer--;
                    if (planet.respawnTimer <= 0) {
                        planet.isDead = false;
                        // מיקום מחדש אקראי כדי שזה יראה דינמי
                        planet.x = Math.random() * 0.8 + 0.1;
                        planet.y = Math.random() * 0.7 + 0.1;
                    }
                }
            });

            // 3. עדכון וציור חלקיקי הפיצוץ
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = p.color;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            requestAnimationFrame(animate);
        }

        // הפעלת האנימציה
        animate();

        // פונקציית הג'אמפסקר של החייזר
        function triggerAlienScare() {
            const overlay = document.getElementById('jumpscareOverlay');
            overlay.style.display = 'flex'; // מציג את החייזר

            // ייצור צליל ביפ גבוה ומלחיץ דרך ה-Web Audio API של הדפדפן
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth'; // צליל מחוספס ומפחיד
                osc.frequency.setValueAtTime(130, audioCtx.currentTime); // תדר נמוך ומלחיץ
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
            } catch(e) {}

            // מעבר אוטומטי לעמוד הראשי index.html אחרי שנייה אחת של פחד
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }
    </script>
</body>
</html>
